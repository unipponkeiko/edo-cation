<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>江戸ケーション｜Edo-cation</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family: 'Noto Serif JP', serif;
  color:#1a1612;
}

/* HERO */
#hero {
  position:relative;
  height:100vh;
  display:flex;
  align-items:center;
}

.hero-bg {
  position:absolute;
  inset:0;
  background:url('uploads/img_home.png') center/cover no-repeat;
}

.hero-content {
  position:relative;
  z-index:2;
  padding:0 8vw;
  max-width:900px;
}

.hero-sub {
  font-family:'Cormorant Garamond', serif;
  font-size:32px;
  letter-spacing:0.25em;
  color:#fff;
  margin-bottom:20px;
}

.hero-tagline {
  font-size:14px;
  letter-spacing:0.2em;
  color:rgba(255,255,255,0.8);
  line-height:2;
  margin-bottom:20px;
}

/* ★ここが今回の修正 */
.hero-produced {
  font-family:'Cormorant Garamond', serif;
  font-style:normal;
  letter-spacing:0.28em;
  font-size:11px;
  color:rgba(255,255,255,0.4);
  opacity:0.45;
}

/* scroll */
.hero-scroll {
  position:absolute;
  bottom:30px;
  left:8vw;
  display:flex;
  gap:12px;
  align-items:center;
}

.scroll-line {
  width:40px;
  height:1px;
  background:rgba(255,255,255,0.5);
}

.scroll-label {
  font-size:11px;
  letter-spacing:0.3em;
  color:rgba(255,255,255,0.5);
}

/* CONTACT */
#contact {
  padding:80px 8vw;
}

.contact-intro {
  margin-bottom:40px;
}

/* フォーム */
.contact-form {
  display:flex;
  flex-direction:column;
  gap:16px;
}

.form-input, .form-textarea {
  border:1px solid #ccc;
  padding:12px;
}

.form-submit {
  border:1px solid #000;
  padding:14px 40px;
  background:none;
  cursor:pointer;
}

</style>
</head>

<body>

<section id="hero">
  <div class="hero-bg"></div>

  <div class="hero-content">
    <p class="hero-sub">Edo-cation</p>
    <p class="hero-tagline">江戸に学び、楽しむとき。</p>
    <p class="hero-produced">produced by うつくしいにっぽん</p>
  </div>

  <div class="hero-scroll">
    <div class="scroll-line"></div>
    <span class="scroll-label">Scroll</span>
  </div>
</section>

<section id="contact">
  <p class="contact-intro">お問い合わせはこちら</p>

  <form class="contact-form">
    <input class="form-input" placeholder="お名前">
    <input class="form-input" placeholder="メール">
    <textarea class="form-textarea" placeholder="内容"></textarea>
    <button class="form-submit">Send</button>
  </form>
</section>

</body>
</html>
